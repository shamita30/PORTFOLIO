services:
  # ── Backend: Python Flask API ──────────────────────────────────────────────
  - type: web
    name: shamita-portfolio-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    rootDir: backend
    envVars:
      - key: GMAIL_CLIENT_ID
        sync: false # Set in Render Dashboard
      - key: GMAIL_CLIENT_SECRET
        sync: false # Set in Render Dashboard
      - key: GMAIL_REFRESH_TOKEN
        sync: false # Set in Render Dashboard
      - key: GMAIL_SEND_FROM
        value: shami2230sr12@gmail.com
      - key: GMAIL_SEND_TO
        value: shami2230sr12@gmail.com
      - key: FRONTEND_URL
        value: https://shamitaportfolio.netlify.app
      - key: SECRET_KEY
        generateValue: true

  # ── Frontend: Vite App (Static Site) ───────────────────────────────────────
  - type: static
    name: shamita-portfolio-frontend
    env: static
    buildCommand: npm install && npm run build
    publishDir: dist
    # Point the frontend to the backend URL via env var
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: shamita-portfolio-backend
          property: host
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
